name: Playwright Tests AITV (VPN)

on:
  workflow_dispatch:

jobs:

  critical:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - run: cat aitv/.env.dev >> $GITHUB_ENV

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install WireGuard
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard-tools iproute2

      - name: Connect VPN
        env:
          WG_CLIENT_CONFIG: ${{ secrets.WG_CLIENT_CONFIG }}
        run: |
          printf "%s\n" "$WG_CLIENT_CONFIG" > wg0.conf
          sudo install -m 600 wg0.conf /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sudo ip route replace 10.3.0.0/16 dev wg0
          rm -f wg0.conf

      - run: npm ci

      - run: npx playwright install --with-deps

      - run: npx playwright test --config=aitv/playwright.config.ts --project=functional --grep @critical
        env:
          CI: true

      - if: always()
        run: sudo wg-quick down wg0

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aitv-critical-report
          path: aitv/playwright-report

      - name: Send Slack notification
        if: always()
        env:
          STATUS: ${{ job.status }}
          JOB_NAME: ${{ github.job }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            --data "{\"message\":\"AITV Job: $JOB_NAME\nStatus: $STATUS\n$RUN_URL\"}" \
            "$WEBHOOK"
