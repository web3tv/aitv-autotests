name: Production Smoke Tests (Nightly)

on:
  schedule:
    - cron: '0 0 * * *'  # каждую ночь в 00:00 UTC
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Deployed prod build number (passed by Argo; empty = use GH run number)'
        required: false
        default: ''

jobs:
  prod-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Write .env.prod
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: printf "%s\n" "$PROD_ENV_FILE" > .env.prod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run production smoke tests
        run: ENV_FILE=.env.prod npx playwright test --project=prodSmoke
        env:
          CI: true
          # Argo передаёт build_number → в отчёт; пусто = номер прогона GH Actions
          BUILD_NUMBER: ${{ github.event.inputs.build_number || github.run_number }}
          BUILD_COMMIT: ${{ github.sha }}

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-smoke-report
          path: playwright-report

      - name: Send Slack notification
        if: always()
        env:
          STATUS: ${{ job.status }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            --data "{\"message\":\"Prod Smoke: $STATUS\n$RUN_URL\"}" \
            "$WEBHOOK"
