name: Critical Tests (Manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Стенд для запуска тестов'
        required: true
        default: 'dev2'
        type: choice
        options:
          - dev2
          - dev1
      task:
        description: 'Номер задачи - W3-XXXX'
        required: true
        type: string

jobs:

  critical:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - name: Load environment config
        run: |
          if [ "${{ inputs.environment }}" = "dev1" ]; then
            grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env.web3tv >> $GITHUB_ENV
          else
            grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env.web3tv2 >> $GITHUB_ENV
          fi

      - name: Link Jira task
        run: |
          echo "### Jira Task" >> $GITHUB_STEP_SUMMARY
          echo "[${{ inputs.task }}](${{ secrets.JIRA_BASE_URL }}/browse/${{ inputs.task }})" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install WireGuard
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard-tools iproute2

      - name: Connect VPN
        env:
          WG_CLIENT_CONFIG: ${{ secrets.WG_CLIENT_CONFIG }}
        run: |
          printf "%s\n" "$WG_CLIENT_CONFIG" > wg0.conf
          sudo install -m 600 wg0.conf /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sudo ip route replace 10.3.0.0/16 dev wg0
          rm -f wg0.conf

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - run: npx playwright test --project=functional --grep @critical
        env:
          CI: true

      - if: always()
        run: sudo wg-quick down wg0

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: critical-report
          path: playwright-report

      - name: Send Slack notification
        if: always()
        env:
          STATUS: ${{ job.status }}
          ENVIRONMENT: ${{ inputs.environment }}
          TASK: ${{ inputs.task }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          LABEL="${ENVIRONMENT}${TASK:+ | $TASK}"
          curl -X POST \
            -H "Content-Type: application/json" \
            --data "{\"message\":\"Critical Tests [$LABEL]\nStatus: $STATUS\n$RUN_URL\"}" \
            "$WEBHOOK"

      - name: Comment on Jira task
        if: always()
        env:
          STATUS: ${{ job.status }}
          ENVIRONMENT: ${{ inputs.environment }}
          TASK: ${{ inputs.task }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Basic $(echo -n "$JIRA_EMAIL:$JIRA_API_TOKEN" | base64)" \
            --data "{
              \"body\": {
                \"type\": \"doc\",
                \"version\": 1,
                \"content\": [{
                  \"type\": \"paragraph\",
                  \"content\": [{
                    \"type\": \"text\",
                    \"text\": \"Autotests [$ENVIRONMENT]: $STATUS\n$RUN_URL\"
                  }]
                }]
              }
            }" \
            "$JIRA_BASE_URL/rest/api/3/issue/$TASK/comment"
