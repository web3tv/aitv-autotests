name: Playwright Tests (VPN)

on:
  pull_request:
    branches: [ main, develop ]
  push:

  workflow_dispatch:

jobs:
  
  visual-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - name: Install WireGuard
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard-tools iproute2

      - name: Connect VPN
        env:
          WG_CLIENT_CONFIG: ${{ secrets.WG_CLIENT_CONFIG }}
        run: |
          printf "%s\n" "$WG_CLIENT_CONFIG" > wg0.conf
          sudo install -m 600 wg0.conf /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sudo ip route replace 10.3.0.0/16 dev wg0
          rm -f wg0.conf


      - name: Run visual tests in Docker
        run: |
          docker run --rm \
            --network host \
            --env-file .env.dev \
            -e CI=true \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            mcr.microsoft.com/playwright:v1.57.0-jammy \
            bash -lc "npm ci --include=dev && npx playwright test --project=visual-desktop-chromium --project=visual-mobile-webkit"

      - name: Disconnect VPN
        if: always()
        run: sudo wg-quick down wg0

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-tests-report
          path: playwright-report

      - name: Send Slack notification
        if: always()
        env:
          STATUS: ${{ job.status }}
          JOB_NAME: ${{ github.job }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            --data "{\"message\":\"Job: $JOB_NAME\nStatus: $STATUS\n$RUN_URL\"}" \
            "$WEBHOOK"

  functional:
    needs: visual-tests
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - run: cat .env.dev >> $GITHUB_ENV

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: |
          sudo apt-get update
          sudo apt-get install -y wireguard-tools iproute2

      - name: Connect VPN
        env:
          WG_CLIENT_CONFIG: ${{ secrets.WG_CLIENT_CONFIG }}
        run: |
          printf "%s\n" "$WG_CLIENT_CONFIG" > wg0.conf
          sudo install -m 600 wg0.conf /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sudo ip route replace 10.3.0.0/16 dev wg0
          rm -f wg0.conf

      - run: npm ci
      - run: npx playwright install --with-deps

      - run: |
          npx playwright test --project=functional
        env:
          CI: true


      - if: always()
        run: sudo wg-quick down wg0

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functional-report
          path: playwright-report

      - name: Send Slack notification
        if: always()
        env:
          STATUS: ${{ job.status }}
          JOB_NAME: ${{ github.job }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            --data "{\"message\":\"Job: $JOB_NAME\nStatus: $STATUS\n$RUN_URL\"}" \
            "$WEBHOOK"

  

