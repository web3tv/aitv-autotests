name: Playwright Tests (VPN)

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]

jobs:

  functional:
    name: Functional Tests
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - name: Load env
        run: cat .env.dev >> $GITHUB_ENV

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # -------- VPN --------
      - name: Install WireGuard
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard-tools iproute2

      - name: Connect VPN
        env:
          WG_CLIENT_CONFIG: ${{ secrets.WG_CLIENT_CONFIG }}
        run: |
          printf "%s\n" "$WG_CLIENT_CONFIG" > wg0.conf
          sudo install -m 600 wg0.conf /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sudo ip route replace 10.3.0.0/16 dev wg0
          rm -f wg0.conf

      - name: Check DEV
        run: curl -I https://web3tv.dev || exit 1

      # -------- Playwright --------
      - name: Install deps
        run: npm ci

      - name: Install browsers
        run: npx playwright install --with-deps

      - name: Run functional tests
        run: |
          npx playwright test --project=functional-chromium
          npx playwright test --project=functional-firefox
        env:
          CI: true

      - name: Disconnect VPN
        if: always()
        run: sudo wg-quick down wg0

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functional-report
          path: playwright-report


