name: Playwright Tests (VPN)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load env from .env.dev
        run: |
          cat .env.dev >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ---------------- VPN ----------------

      - name: Install WireGuard VPN Client
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard-tools iproute2

      - name: Connect to WireGuard VPN
        env:
          WG_CLIENT_CONFIG: ${{ secrets.WG_CLIENT_CONFIG }}
        run: |
          printf "%s\n" "$WG_CLIENT_CONFIG" > wg0.conf
          sudo install -m 600 wg0.conf /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sudo ip route replace 10.3.0.0/16 dev wg0
          rm -f wg0.conf

          echo "=== WireGuard status ==="
          sudo wg show
          ip addr show wg0
          ip route

      - name: Check DEV availability
        run: |
          curl -I https://web3tv.dev || exit 1

          
      # ---------------- Playwright ----------------

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
      
      - name: Disconnect VPN
        if: always()
        run: sudo wg-quick down wg0

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
