name: Playwright Tests (VPN)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  playwright:
    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ---------------- VPN ----------------

      - name: Install WireGuard VPN Client
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard-tools iproute2

      - name: Connect to WireGuard VPN
        env:
          WG_CLIENT_CONFIG: ${{ secrets.WG_CLIENT_CONFIG }}
        run: |
          printf "%s\n" "$WG_CLIENT_CONFIG" > wg0.conf
          sudo install -m 600 wg0.conf /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sudo ip route replace 10.3.0.0/16 dev wg0
          rm -f wg0.conf

          echo "=== WireGuard status ==="
          sudo wg show
          ip addr show wg0
          ip route

      # ---------------- Playwright ----------------

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium only
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

          BASE_URL: ${{ secrets.BASE_URL }}

          USER_CHANNEL_PUBLIC_URL: ${{ secrets.USER_CHANNEL_PUBLIC_URL }}
          USER_CHANNEL_PRIVATE_URL: ${{ secrets.USER_CHANNEL_PRIVATE_URL }}
          USER_CHANNEL_PAID_URL: ${{ secrets.USER_CHANNEL_PAID_URL }}

          USER_LOGIN_PUBLIC: ${{ secrets.USER_LOGIN_PUBLIC }}
          USER_LOGIN_PRIVATE: ${{ secrets.USER_LOGIN_PRIVATE }}
          USER_LOGIN_PAID: ${{ secrets.USER_LOGIN_PAID }}
          USER_LOGIN_ADMIN: ${{ secrets.USER_LOGIN_ADMIN }}

          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          USER_EXIST: ${{ secrets.USER_EXIST }}

          VIDEO_PRIVATE_URL: ${{ secrets.VIDEO_PRIVATE_URL }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
