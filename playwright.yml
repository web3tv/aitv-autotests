name: Playwright Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  playwright:
    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        # run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

          # Base
          BASE_URL: ${{ secrets.BASE_URL }}

          # User channels URLs
          USER_CHANNEL_PUBLIC_URL: ${{ secrets.USER_CHANNEL_PUBLIC_URL }}
          USER_CHANNEL_PRIVATE_URL: ${{ secrets.USER_CHANNEL_PRIVATE_URL }}
          USER_CHANNEL_PAID_URL: ${{ secrets.USER_CHANNEL_PAID_URL }}

          # Users
          USER_LOGIN_PUBLIC: ${{ secrets.USER_LOGIN_PUBLIC }}
          USER_LOGIN_PRIVATE: ${{ secrets.USER_LOGIN_PRIVATE }}
          USER_LOGIN_PAID: ${{ secrets.USER_LOGIN_PAID }}
          USER_LOGIN_ADMIN: ${{ secrets.USER_LOGIN_ADMIN }}

          # Password / flags
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          USER_EXIST: ${{ secrets.USER_EXIST }}

          # Videos
          VIDEO_PRIVATE_URL: ${{ secrets.VIDEO_PRIVATE_URL }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
